<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in or sign up | Airbnb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login-styles.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="header-inner">
    <a href="#" class="logo">
      <span class="wordmark">airbnb</span>
    </a>
  </div>
</header>

<!-- ===== LOGIN MODAL ===== -->
<main class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <span class="modal-title">Log in or sign up</span>
      <button class="close-btn" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <h1>Welcome to Airbnb</h1>

      <label class="field-group">
        <span class="field-label">Country/Region</span>
        <select class="country-select">
          <option>Nigeria (+234)</option>
          <option>United States (+1)</option>
          <option>United Kingdom (+44)</option>
          <option>Ghana (+233)</option>
        </select>
      </label>

      <label class="field-group">
        <span class="field-label">Phone number</span>
        <input type="tel" class="text-input" placeholder="Phone number">
      </label>

      <p class="fine-print">
        We'll call or text you to confirm your number. Standard message and data rates apply.
        <a href="#">Privacy Policy</a>
      </p>

      <button class="continue-btn">Continue</button>

      <div class="divider">
        <span>or</span>
      </div>

      <button class="social-btn">
        <span class="social-icon">📧</span>
        Continue with email
      </button>

      <button class="social-btn">
        <span class="social-icon">🍎</span>
        Continue with Apple
      </button>

      <button class="social-btn">
        <span class="social-icon">🔍</span>
        Continue with Google
      </button>

      <button class="social-btn">
        <span class="social-icon">📘</span>
        Continue with Facebook
      </button>
    </div>

  </div>
</main>

<p class="designed-by"><strong>Designed By:</strong> Etafo Eminence Osikhume - Registration number:HiiT/2026 /11448</p>

</body>
</html>
